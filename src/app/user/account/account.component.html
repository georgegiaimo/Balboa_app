<div class="flex">
  <app-sidemenu></app-sidemenu>
  <main class="flex-1 p-8 bg-gray-100 h-screen overflow-y-auto">
    

  <div class="max-w-3xl mx-auto">
    
    <div class="pt-10 mb-8">
      <h1 class="text-3xl font-bold text-gray-900">Account Settings</h1>
      <p class="mt-2 text-sm text-gray-600">Manage your profile information and security settings.</p>
    </div>

    <section class="bg-white shadow-sm rounded-xl border border-gray-200 overflow-hidden mb-6">
      <div class="p-6">
        <h3 class="text-lg font-medium text-gray-900 mb-4">Profile Information</h3>
        <div class="grid grid-cols-1 gap-y-6">
          <div>
            <label class="block text-sm font-medium text-gray-700">Full Name</label>
            <div class="mt-1 flex items-center justify-between">
              <span class="text-gray-900">John Doe</span>
              <button class="text-sm font-semibold text-blue-600 hover:text-blue-500">Edit</button>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Email Address</label>
            <div class="mt-1 flex items-center justify-between">
              <span class="text-gray-900">john.doe&#64;example.com</span>
              <button class="text-sm font-semibold text-blue-600 hover:text-blue-500">Change</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="bg-white shadow-sm rounded-xl border border-gray-200 overflow-hidden mb-6">
      <div class="p-6">
        <h3 class="text-lg font-medium text-gray-900 mb-4">Security</h3>
        
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700">Phone Number</label>
          <div class="mt-2 flex items-center space-x-3">
            <input type="tel" placeholder="+1 (555) 000-0000" class="block w-full max-w-xs rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
            <button class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700">
              Verify
            </button>
          </div>
          <p class="mt-2 text-xs text-gray-500">You will receive a 6-digit code via SMS.</p>
        </div>

        <div class="pt-4 border-t border-gray-100">
          <button class="inline-flex items-center px-4 py-2 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
            Update Password
          </button>
        </div>
      </div>
    </section>

    <section class="bg-red-50 shadow-sm rounded-xl border border-red-100 overflow-hidden">
      <div class="p-6">
        <h3 class="text-lg font-medium text-red-900 mb-2">Danger Zone</h3>
        <p class="text-sm text-red-700 mb-4">Once you delete your account, there is no going back. Please be certain.</p>
        <button class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-red-600 hover:bg-red-700">
          Delete Account
        </button>
      </div>
    </section>

  </div>


  </main>
</div>
