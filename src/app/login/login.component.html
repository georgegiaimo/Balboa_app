<div class="min-h-screen bg-slate-50 flex flex-col">
  
  <!--
  <header class="w-full bg-white border-b border-slate-200 px-6 py-4">
    <div class="flex items-center">
      <div class="flex items-center space-x-2">
       
        </div>
    </div>
  </header>
  -->
  <main class="flex-1 flex items-center justify-center p-6">
    <div class="w-full max-w-md">
      <div class="bg-white rounded-2xl shadow-xl border border-slate-100 p-8 md:p-10">
        
        <div class="text-center mb-8">
          <h2 class="text-2xl font-bold text-slate-900">Welcome back</h2>
          <p class="text-slate-500 mt-2">Please enter your details to sign in</p>
        </div>

        @if(login_error_message){
        <div class="flex-1 pb-4">
          <h3 class="text-sm font-semibold text-red-700">{{ login_error_message }}</h3>
        </div>
        }

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
          <div>
            <label for="email" class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
            <input id="email" 
              type="email" 
              formControlName="email"  
                   placeholder="name@company.com" 
                   class="w-full rounded-xl border-slate-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 p-3 border transition-all outline-none">
          </div>

          <div>
            <div class="flex justify-between mb-2">
              <label for="password" class="text-sm font-semibold text-slate-700">Password</label>
              <a (click)="gotoForgotPassword()" class="text-sm font-bold text-blue-600 hover:text-blue-700 cursor-pointer">Forgot password?</a>
            </div>
            <input id="password" 
              type="password" 
              formControlName="password" 
                   placeholder="••••••••" 
                   class="w-full rounded-xl border-slate-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 p-3 border transition-all outline-none">
          </div>

          
          <button 
            type="submit" 
            [disabled]="loginForm.invalid || is_loading"
            class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed">
            <span *ngIf="!is_loading">Log In</span>
            <span *ngIf="is_loading" class="flex items-center">
              <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Processing...
            </span>
          </button>
          </form>

        <!--
        <p class="text-center text-slate-500 text-sm mt-8">
          Don't have an account? 
          <a href="#" class="font-bold text-slate-900 hover:underline">Sign up for free</a>
        </p>
        -->
      </div>
    </div>
  </main>
</div>
