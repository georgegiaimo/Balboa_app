<div class="min-h-screen bg-slate-50 flex flex-col">
  
  <header class="w-full bg-white border-b border-slate-200 px-6 py-4">
    <div class="flex items-center">
      <div class="flex items-center space-x-2">
        <!--
        <a href="/">
            <img src="assets/images/balboa_logo.png" class="logo">
            <div class="text-3xl font-bold tracking-tight text-teal-600 inline-block align-middle">
                Thera<span class="text-purple-700">Loom</span>
            </div>
        </a>
        -->
        </div>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center p-6">
    <div class="w-full max-w-md">
      <div class="bg-white rounded-2xl shadow-xl border border-slate-100 p-8 md:p-10">
        
        <div class="text-center mb-8">
          <h2 class="text-2xl font-bold text-slate-900">Welcome back</h2>
          <p class="text-slate-500 mt-2">Please enter your details to sign in</p>
        </div>

        <form class="space-y-6">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
            <input type="email" 
                   placeholder="name@company.com" 
                   class="w-full rounded-xl border-slate-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 p-3 border transition-all outline-none">
          </div>

          <div>
            <div class="flex justify-between mb-2">
              <label class="text-sm font-semibold text-slate-700">Password</label>
              <a href="#" class="text-sm font-bold text-teal-600 hover:text-blue-700">Forgot password?</a>
            </div>
            <input type="password" 
                   placeholder="••••••••" 
                   class="w-full rounded-xl border-slate-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 p-3 border transition-all outline-none">
          </div>

          
          <button type="button" (click)="goto('dashboard')"
                  class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-200 transition-all active:scale-[0.98] mt-6">
            Log In
          </button>
          </form>

        <p class="text-center text-slate-500 text-sm mt-8">
          Don't have an account? 
          <a href="#" class="font-bold text-slate-900 hover:underline">Sign up for free</a>
        </p>
      </div>
    </div>
  </main>
</div>
