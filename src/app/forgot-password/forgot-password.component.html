<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4 py-12 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl shadow-lg border border-gray-100">
    
    <div class="text-center">
      <h2 class="text-3xl font-extrabold text-gray-900">Forgot Password?</h2>
      <p class="mt-2 text-sm text-gray-600">
        Enter your email and we'll send you a link to reset your password.
      </p>
    </div>

    @if(is_sent){
    <div class="animate-fade-in text-center space-y-4">
      <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100">
        <svg class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
      </div>
      <p class="text-gray-700">Check your inbox! We've sent instructions to <strong>{{ forgotForm.value.email }}</strong>.</p>
      <a routerLink="/login" class="inline-block font-medium text-indigo-600 hover:text-indigo-500">
        Return to login
      </a>
    </div>
    }
    @else{
    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="mt-8 space-y-6">
      
      <div *ngIf="errorMessage" class="rounded-md bg-red-50 p-4 border border-red-200">
        <p class="text-sm text-red-700">{{ errorMessage }}</p>
      </div>

      <div class="rounded-md shadow-sm -space-y-px">
        <div>
          <label for="email-address" class="sr-only">Email address</label>
          <input id="email-address" type="email" formControlName="email" required
            class="appearance-none rounded-md relative block w-full px-3 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm"
            [ngClass]="{'border-red-500': forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched}"
            placeholder="Email address">
        </div>
      </div>

      <div>
        <button type="submit" [disabled]="forgotForm.invalid || is_loading"
          class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:bg-indigo-400 disabled:cursor-not-allowed transition-all">
          
          <span *ngIf="is_loading" class="absolute left-0 inset-y-0 flex items-center pl-3">
            <div class="size-4 animate-spin rounded-full border-2 border-white/30 border-t-white"></div>
          </span>
          
          {{ is_loading ? 'Sending...' : 'Send Reset Link' }}
        </button>
      </div>

      <div class="text-center">
        <a (click)="gotoLogin()" class="font-medium text-sm text-indigo-600 hover:text-indigo-500 cursor-pointer">
          Back to login
        </a>
      </div>
    </form>
    }
  </div>
</div>
