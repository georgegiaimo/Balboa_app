<div class="flex">
    <app-sidemenu></app-sidemenu>
    <main class="flex-1 p-8 bg-gray-100 h-screen overflow-y-auto">

        <nav class="flex items-center text-sm text-gray-500 mb-4 cursor-pointer pb-4">
            <a (click)="gotoCoordinators()" class="hover:text-blue-600 transition-colors">Coordinators</a>
            @if(coordinator){
            <span class="mx-2">/</span>
            <a (click)="gotoCoordinatorDetails()" class="hover:text-blue-600 transition-colors">{{ coordinator.first_name }}&nbsp;{{ coordinator.last_name }}</a>
            }
            <span class="mx-2">/</span>
            <span class="text-gray-900 font-medium">Edit Coordinator Assignment</span>
        </nav>

        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                 @if(coordinator){
                <h1 class="text-2xl font-bold text-gray-900">
                    {{coordinator_assignment_id > 0 ? 'Edit ':'Add '}}&nbsp;Coordinator Assignment for {{ coordinator.first_name }}&nbsp;{{ coordinator.last_name }}</h1>
                }
            </div>

        </div>


        <div class="max-w-2xl mx-auto p-8 bg-white border border-slate-200 rounded-2xl shadow-sm">

            <form [formGroup]="coordinatorAssignmentForm" (ngSubmit)="onSubmit()" class="space-y-5">

                <div class="relative">
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Production</label>
                    <input type="text" formControlName="production" (focus)="showAutocomplete = true"
                        (blur)="showAutocomplete = false" placeholder="Search for a production..."
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">

                    <div *ngIf="showAutocomplete"
                        class="absolute z-10 w-full mt-1 bg-white border border-slate-200 rounded-lg shadow-lg max-h-48 overflow-y-auto">
                        <div *ngFor="let option of filteredProductions$ | async" (mousedown)="selectProduction(option)"
                            class="px-4 py-2 hover:bg-blue-50 cursor-pointer text-slate-700 transition">
                            {{ option }}
                        </div>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Status</label>
                    <select formControlName="status"
                        class="w-full px-3 py-2 border border-slate-300 rounded-md bg-white outline-none focus:ring-1 focus:ring-blue-500">
                        <option value="active">active</option>
                        <option value="inactive">inactive</option>
                    </select>
                </div>
                <!--
                <div>
                     <label class="block text-sm font-semibold text-slate-700 mb-1">Status</label>
                    <div class="text-center">
                        <button class="w-[200px] p-2 rounded-lg transition-all shadow-md active:scale-95" (click)="selectStatus('active')"
                            [ngClass]="{'bg-green-100 text-green-900 shadow-sm ring-1 ring-green-200': coordinatorAssignmentForm.get('status')?.value === 'active'}">Active</button>
                        <button class="w-[200px] p-2 rounded-lg transition-all shadow-md active:scale-95" (click)="selectStatus('inactive')"
                            [ngClass]="{'bg-gray-100 text-gray-900 shadow-sm ring-1 ring-gray-200': coordinatorAssignmentForm.get('status')?.value === 'inactive'}">Inactive</button>
                    </div>
                </div>
                -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Notes</label>
                    <textarea formControlName="notes" rows="3"
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition resize-none"></textarea>
                </div>

                <div class="pt-4">
                    <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all shadow-md active:scale-95 disabled:bg-slate-300">
                        @if (coordinator_assignment_id == 0) { Create Assignment }
                        @else { Save Assignment }
                    </button>
                </div>

            </form>
        </div>

    </main>
</div>
