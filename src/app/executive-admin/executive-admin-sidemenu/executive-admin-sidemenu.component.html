<div [ngClass]="is_collapsed ? 'w-20' : 'w-48'"
    class="h-screen bg-slate-900 text-white transition-all duration-300 ease-in-out flex flex-col p-4 shadow-xl">

    <!--
    <div class="flex items-center justify-between mb-10">
        <h1 *ngIf="!is_collapsed" class="text-xl font-bold transition-opacity">Balboa</h1>
        <button (click)="toggleSidebar()" class="p-2 rounded-lg hover:bg-slate-800">
            {{ is_collapsed ? '➡️' : '⬅️' }}
        </button>
    </div>
-->
    <div class="flex items-center justify-between mb-10">
        <h1 *ngIf="!is_collapsed" class="text-xl font-bold text-white transition-all duration-300">
            Balboa
        </h1>

        <button (click)="toggleSidebar()"
            class="p-2 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors duration-200"
            aria-label="Toggle Sidebar">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                stroke="currentColor" class="w-6 h-6 transition-transform duration-300"
                [class.rotate-180]="is_collapsed">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
            </svg>
        </button>
    </div>

    <nav class="space-y-2">
       
        @if (user.role == 'executive-admin'){
        <a (click)="goto('e/productions')"
            class="flex items-center p-3 rounded-lg hover:bg-blue-600 transition-colors group cursor-pointer">
            <span class="text-2xl">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
                    class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M10.34 15.84c-.688-.06-1.386-.09-2.09-.09H7.5a4.5 4.5 0 1 1 0-9h.75c.704 0 1.402-.03 2.09-.09m0 9.18c.253.962.584 1.892.985 2.783.247.55.06 1.21-.463 1.511l-.657.38c-.551.318-1.26.117-1.527-.461a13.247 13.247 0 0 1-1.022-2.89m2.667-1.323c.458.066.92.103 1.391.11h4.5c1.105 0 2.01-.867 2.214-1.911l.24-1.23a2.25 2.25 0 0 0 0-1.718l-.24-1.23a2.25 2.25 0 0 0-2.214-1.911h-4.5c-.47 0-.933.037-1.391.11m1.391 9.18c3.193.466 6.557.703 9.984.703a.75.75 0 0 0 .75-.75V2.25a.75.75 0 0 0-.75-.75c-3.427 0-6.791.237-9.984.703" />
                </svg>
            </span>
            @if (!is_collapsed){
            <span class="ml-4 font-medium">Productions</span>
            }
            @else{
            <div class="absolute left-20 hidden group-hover:block bg-black text-white text-xs p-2 rounded">
                Productions
            </div>
            }
        </a>
        <a (click)="goto('e/users')"
            class="flex items-center p-3 rounded-lg hover:bg-blue-600 transition-colors group cursor-pointer">
            <span class="text-2xl">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
                    class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z" />
                </svg>
        
            </span>
            @if (!is_collapsed){
            <span class="ml-4 font-medium">Users</span>
            }
            @else{
            <div class="absolute left-20 hidden group-hover:block bg-black text-white text-xs p-2 rounded">
                Users
            </div>
            }
        </a>
        <a (click)="goto('e/activity')"
            class="flex items-center p-3 rounded-lg hover:bg-blue-600 transition-colors group cursor-pointer">
            <span class="text-2xl">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
                    class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M3 13.125C3 12.504 3.504 12 4.125 12h.375c.621 0 1.125.504 1.125 1.125v6.75C5.625 20.496 5.121 21 4.5 21h-.375A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h.375c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-.375a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h.375C18.621 3 19.125 3.504 19.125 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-.375a1.125 1.125 0 01-1.125-1.125V4.125z" />
                </svg>
            </span>
            @if (!is_collapsed){
            <span class="ml-4 font-medium">Activity</span>
            }
            @else{
            <div class="absolute left-20 hidden group-hover:block bg-black text-white text-xs p-2 rounded">
                Activity
            </div>
            }
        </a>
         <a (click)="goto('e/mailing')"
            class="flex items-center p-3 rounded-lg hover:bg-blue-600 transition-colors group cursor-pointer">
            <span class="text-2xl">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
            </span>
            @if (!is_collapsed){
            <span class="ml-4 font-medium">Mailing</span>
            }
            @else{
            <div class="absolute left-20 hidden group-hover:block bg-black text-white text-xs p-2 rounded">
                Mailing
            </div>
            }
        </a>
        }
        <a class="flex items-center p-3 rounded-lg hover:bg-blue-600 transition-colors group cursor-pointer"
            (click)="logOut()">
            <span class="text-2xl">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15m-3 0-3-3m0 0 3-3m-3 3H15" />
                </svg>
            </span>
            @if (!is_collapsed){
            <span class="ml-4 font-medium">Log out</span>
            }
            @else{
            <div class="absolute left-20 hidden group-hover:block bg-black text-white text-xs p-2 rounded">
                Log out
            </div>
            }
        </a>
    </nav>
</div>
