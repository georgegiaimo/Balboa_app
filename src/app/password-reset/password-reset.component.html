<div class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
   @if (page == 'form'){
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <img class="mx-auto h-36 w-auto" src="assets/images/a305cb05-4006-44fb-92d3-345b170b7413.png" alt="Balboa Computer">
   
    <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
      Set new password
    </h2>
    <p class="mt-2 text-center text-sm text-gray-600">
      Please choose a strong password to protect your account.
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10">
      <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="space-y-6">
        
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">
            New Password
          </label>
          <div class="mt-1">
            <input 
              id="password" 
              type="password" 
              formControlName="password"
              class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
              [class.border-red-500]="resetForm.get('password')?.invalid && resetForm.get('password')?.touched">
          </div>
        </div>

        <div>
          <label for="confirmPassword" class="block text-sm font-medium text-gray-700">
            Confirm New Password
          </label>
          <div class="mt-1">
            <input 
              id="confirmPassword" 
              type="password" 
              formControlName="confirmPassword"
              class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
              [class.border-red-500]="resetForm.hasError('mismatch') && resetForm.get('confirmPassword')?.touched">
          </div>
          <p *ngIf="resetForm.hasError('mismatch') && resetForm.get('confirmPassword')?.touched" class="mt-2 text-sm text-red-600">
            Passwords do not match.
          </p>
        </div>

        <div>
          <button 
            type="submit" 
            [disabled]="resetForm.invalid || isLoading"
            class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed">
            <span *ngIf="!isLoading">Update Password</span>
            <span *ngIf="isLoading" class="flex items-center">
              <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Processing...
            </span>
          </button>
        </div>
      </form>
    </div>
  </div>
    }
    @else if (page == 'error') {
        <div class="sm:mx-auto sm:w-full sm:max-w-md">
            <img class="mx-auto h-36 w-auto" src="assets/images/a305cb05-4006-44fb-92d3-345b170b7413.png" alt="Balboa Computer">
        
            <p class="mt-2 text-center text-sm text-gray-600">
                Token is invalid or has expired.
            </p>
        </div>
    }
    @else if (page == 'success') {
        <div class="sm:mx-auto sm:w-full sm:max-w-md">
            <img class="mx-auto h-36 w-auto" src="assets/images/a305cb05-4006-44fb-92d3-345b170b7413.png" alt="Balboa Computer">
        
            <p class="mt-2 text-center text-sm text-gray-600">
                Your password has been changed.
            </p>
            <button (click)="gotoLogin()"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all shadow-md active:scale-95 disabled:bg-slate-300 my-6">
                Go to login
            </button>
        </div>
    }
</div>
